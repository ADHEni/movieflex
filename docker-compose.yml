services:
  postgres:
    image: postgres:16-alpine
    container_name: movieflex-postgres
    environment:
      POSTGRES_DB: movieflex
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - movieflex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d movieflex"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: movieflex-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/movieflex

volumes:
  movieflex_postgres_data: